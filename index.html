<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KiraOfficialASLV - Sweet Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg, #fff5f7 0%, #fff0f3 50%, #ffffff 100%);
    background-attachment: fixed;
    min-height:100vh;
}

/* HEADER */
.header{
    padding:80px 20px;
    text-align:center;
    border-bottom-left-radius:60px;
    border-bottom-right-radius:60px;
    background-image: url('foto/foto halaaman.png'); /* ✅ SUDAH DIGANTI DI SINI */
    background-size: 300px;
    background-repeat: repeat;
    background-position: center;
    position: relative;
    box-shadow: 0 15px 40px rgba(255, 175, 189, 0.4);
}

.header::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 255, 255, 0.2);
    border-bottom-left-radius:60px;
    border-bottom-right-radius:60px;
}

.logo{
    width:160px;
    height:160px;
    object-fit: cover;
    border-radius:50%;
    border: 6px solid white;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    transition:0.8s;
    position: relative;
    z-index: 2;
}

.logo:hover{
    transform:rotateY(360deg) scale(1.05);
}

.header h1{
    margin-top:25px;
    font-size:42px;
    font-weight: 800;
    color: #b56576;
    text-shadow: 2px 2px 0px white, -2px -2px 0px white, 2px -2px 0px white, -2px 2px 0px white;
    letter-spacing: 2px;
    position: relative;
    z-index: 2;
}

/* PRODUK */
.section-title{
    text-align:center;
    margin:60px 0 30px;
    font-size:34px;
    font-weight:700;
    color:#b56576;
    position: relative;
}

.section-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 4px;
    background: linear-gradient(to right, #ffafbd, #ffc3a0);
    margin: 10px auto;
    border-radius: 10px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:35px;
    padding:20px;
}

.card{
    width:280px;
    background:white;
    border-radius:30px;
    padding:20px;
    text-align:center;
    box-shadow: 0 10px 30px rgba(255, 182, 193, 0.15);
    transition:0.5s;
    border: 1px solid rgba(255, 209, 220, 0.5);
    overflow: hidden;
}

.card:hover{
    transform:translateY(-15px);
    box-shadow: 0 25px 50px rgba(255, 175, 189, 0.4);
}

.card img{
    width:100%;
    height:280px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:15px;
}

.card h3{ margin-bottom:8px; color:#4a4a4a; font-size: 19px; }
.card p{ font-size:13px; margin-bottom:12px; color:#777; line-height: 1.5; }

.card h4{ 
    margin-bottom:15px; 
    font-size: 22px; 
    font-weight: 800;
    background: linear-gradient(to right, #ff758f, #ffafbd);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
}

.qty{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
}

.qty input{
    width:65px;
    text-align:center;
    padding:6px;
    border-radius:10px;
    border:2px solid #fff0f3;
    outline: none;
    font-weight: 600;
    color: #b56576;
}

.btn{
    display:inline-block;
    padding:14px 25px;
    background: linear-gradient(45deg, #ff758f 0%, #ffafbd 100%);
    color:white;
    border:none;
    border-radius:35px;
    cursor:pointer;
    font-weight:600;
    transition:0.4s;
    width: 100%;
    box-shadow: 0 8px 20px rgba(255, 117, 143, 0.3);
}

.btn:hover{
    background: linear-gradient(45deg, #ffafbd 0%, #ff758f 100%);
    transform:scale(1.03);
    box-shadow: 0 12px 25px rgba(255, 117, 143, 0.5);
}

/* KERANJANG */
.cart{
    max-width:900px;
    margin:70px auto;
    background:white;
    padding:35px;
    border-radius:40px;
    box-shadow:0 30px 60px rgba(255, 182, 193, 0.2);
    border: 3px dashed #ffe4e9;
}

.cart h2{ margin-bottom:25px; color:#b56576; text-align: center; font-size: 28px;}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    padding:15px 0;
    border-bottom: 1px solid #fff0f3;
}

.remove-btn{
    background: #ffb3c1;
    color:white;
    border:none;
    padding:6px 15px;
    border-radius:20px;
    cursor:pointer;
    font-size:12px;
    transition: 0.3s;
}

.remove-btn:hover{ background: #ff4d6d; }

.total-cart{
    font-weight:800;
    margin-top:30px;
    font-size:24px;
    text-align: right;
    color: #ff758f;
}

footer{
    text-align:center;
    padding:50px 20px;
    margin-top:80px;
    background: linear-gradient(to right, #ffafbd, #ffc3a0);
    font-weight:600;
    color: white;
    border-top-left-radius: 60px;
    border-top-right-radius: 60px;
}
</style>
</head>
<body>

<header class="header">
    <img src="foto/profil.png" class="logo">
    <h1>KiraOfficialASLV</h1>
</header>

<h2 class="section-title">Sweet Collections</h2>

<div class="container" id="product-container"></div>

<div class="cart">
    <h2>🛒 Keranjang Belanja</h2>
    <div id="cart-list"></div>
    <div class="total-cart">
        Total: Rp <span id="grand-total">0</span>
    </div>
    <br>
    <button class="btn" onclick="checkoutCart()" style="font-size: 18px;">Checkout via WhatsApp</button>
</div>

<footer>
    © 2026 | Dibuat oleh IG@Rifan_ms19<br>
    📧 rifanmuchtarsupriatna@gmail.com
</footer>

<script>
const produk=[
     {nama:"cardigan crop rajut", harga:40000, deskripsi:"Atasan crop cardigan dengan desain feminim 💕Dilengkapi dengan detail tali depan yang bisa diikat, memberikan kesan cute & stylish. Cocok dipadukan dengan celana high waist atau rok.", gambar:"foto/baju.png"},
    {nama:"celana jeans baggy", harga:120000, deskripsi:"Celana panjang wanita warna pastel yang lembut dan elegan 🌷Model simple tapi tetap stylish, cocok untuk tampilan casual hingga semi formal..", gambar:"foto/celana.png"},
    {nama:"celana panjang straight pants", harga:40000, deskripsi:"Celana panjang wanita dengan desain minimalis dan elegan 🤍Tanpa motif, cocok untuk kamu yang suka tampilan clean, simple, tapi tetap stylish. Mudah dipadukan dengan berbagai atasan..", gambar:"foto/straight pants.png"},
    {nama:"celana cutbray", harga:45000, deskripsi:"Celana panjang warna cream dengan model elegan dan simpel 🤍Cocok untuk tampilan lebih dewasa, classy, dan rapi..", gambar:"foto/cutbray.png"},
    {nama:"rok bermotif bunga", harga:35000, deskripsi:"Rok wanita dengan motif bunga kecil yang manis dan feminin 💕Memberikan kesan soft & aesthetic, cocok untuk kamu yang suka tampilan girly dan elegan.", gambar:"foto/rok panjang bermotif bunga.png"},
    {nama:"atasan model tank top", harga:25000, deskripsi:"Atasan tanktop dengan model babydoll yang flowy dan lucu 💙Detail kancing depan menambah kesan unik & stylish.", gambar:"foto/atasan model tank top.png"},
    {nama:"cardigan rajut", harga:35000, deskripsi:"Sweater rajut warna ungu pastel yang hangat dan stylish 💜Cocok untuk tampilan santai tapi tetap fashionable..", gambar:"foto/cardigan rajut.png"},
    {nama:"cardigan rajut", harga:35000, deskripsi:"Sweater rajut dengan desain simpel tapi tetap stylish. Bahannya lembut, nyaman dipakai, dan cocok untuk dipakai sehari-hari.", gambar:"foto/cardigan rajut 2.png"}
];

let cart=[];

function formatRupiah(angka){
return angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

const container=document.getElementById("product-container");

produk.forEach((item,index)=>{
container.innerHTML+=`
<div class="card">
<img src="${item.gambar}">
<h3>${item.nama}</h3>
<p>${item.deskripsi}</p>
<h4>Rp ${formatRupiah(item.harga)}</h4>
<div class="qty">
<label>Qty:</label>
<input type="number" min="1" value="1" id="qty${index}">
</div>
<button class="btn" onclick="addToCart(${index})">
Tambah ke Keranjang
</button>
</div>
`;
});

function addToCart(index){
let qty=parseInt(document.getElementById("qty"+index).value);
let item=produk[index];
cart.push({...item, qty:qty});
renderCart();
}

function renderCart(){
let list=document.getElementById("cart-list");
list.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
let subtotal=item.harga*item.qty;
total+=subtotal;

list.innerHTML+=`
<div class="cart-item">
<span>${item.nama} x${item.qty}</span>
<span>Rp ${formatRupiah(subtotal)}</span>
<button class="remove-btn" onclick="removeItem(${index})">Hapus</button>
</div>
`;
});

document.getElementById("grand-total").innerText=formatRupiah(total);
}

function removeItem(index){
cart.splice(index,1);
renderCart();
}

function checkoutCart(){
if(cart.length===0){
alert("Keranjang masih kosong!");
return;
}

let nama=prompt("Masukkan Nama Anda:");
let alamat=prompt("Masukkan Alamat Pengiriman:");
if(!nama||!alamat)return;

let preview=`<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:9999;">
<div style="background:white;padding:20px;border-radius:20px;max-width:500px;width:90%;max-height:80%;overflow:auto;">
<h2>Ringkasan Pesanan</h2>`;

let pesan="Halo KiraOfficialASLV,%0A%0ASaya ingin memesan:%0A";

cart.forEach(item=>{
let subtotal=item.harga*item.qty;
preview+=`
<div style="display:flex;align-items:center;margin-bottom:10px;">
<img src="${item.gambar}" style="width:60px;height:60px;object-fit:cover;border-radius:10px;margin-right:10px;">
<div>
<b>${item.nama}</b><br>
Qty: ${item.qty}<br>
Rp ${formatRupiah(subtotal)}
</div>
</div>`;
pesan+="🍪 "+item.nama+" x"+item.qty+" - Rp "+formatRupiah(subtotal)+"%0A";
});

preview+=`<br><b>Nama:</b> ${nama}<br>
<b>Alamat:</b> ${alamat}<br><br>
<button onclick="window.open('https://wa.me/628889429380?text=${pesan}%0A👤 Nama: ${nama}%0A📍 Alamat: ${alamat}','_blank');location.reload();" style="background:#25D366;color:white;padding:10px 20px;border:none;border-radius:10px;cursor:pointer;">Kirim ke WhatsApp</button>
<button onclick="this.closest('div').parentElement.remove()" style="margin-left:10px;padding:10px 20px;">Batal</button>
</div></div>`;

document.body.insertAdjacentHTML("beforeend",preview);
}
</script>

</body>
</html>
